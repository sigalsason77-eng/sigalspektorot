<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משימת הכספת - פסח</title>
    <style>
        :root { --primary-red: #e94560; --success-green: #4eff4e; --dark-bg: #0a0a1a; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; touch-action: manipulation; }
        
        .clinic-logo {
            position: absolute;
            top: 15px;
            left: 15px;
            width: clamp(60px, 12vw, 100px);
            z-index: 1000;
            border-radius: 10px;
            pointer-events: none;
        }

        .vault-scene { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            height: 100dvh;
            overflow: hidden; 
            background: #16213e; 
        }

        .door { 
            position: absolute; 
            width: 50%; 
            height: 100%; 
            background-repeat: no-repeat;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1); 
            z-index: 10; 
        }

        /* הגדרות למחשב (מסך רחב) */
        @media (min-width: 768px) {
            .door { background-size: cover; }
            .door-left { left: 0; background-image: url('כספתשמאל.png'); background-position: center right; }
            .door-right { right: 0; background-image: url('כספתימין.png'); background-position: center left; }
        }

        /* הגדרות מיוחדות לטלפון (מסך צר) */
        @media (max-width: 767px) {
            .door { 
                background-size: 100% auto; /* התמונה תתפרס על כל הרוחב ותתאים גובה אוטומטית */
                background-position: center; 
            }
            .door-left { left: 0; background-image: url('כספתשמאל.png'); }
            .door-right { right: 0; background-image: url('כספתימין.png'); }
        }

        .open .door-left { transform: translateX(-100%); }
        .open .door-right { transform: translateX(100%); }

        /* שאר העיצוב ללא שינוי תוכן */
        #intro-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 26, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; text-align: center; padding: 20px; box-sizing: border-box;
        }

        .game-area { 
            position: absolute; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #16213e, #0f3460); z-index: 1; padding: 15px; box-sizing: border-box; 
        }

        #action-btn, .start-btn { 
            z-index: 80; padding: 15px 35px; font-size: clamp(16px, 4vw, 22px); 
            background: var(--primary-red); color: white; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold;
        }
        #action-btn { position: absolute; bottom: 12%; }
        
        .riddle-text { font-size: clamp(16px, 4.5vw, 22px); text-align: center; margin-bottom: 10px; font-weight: bold; width: 90%; }
        .inputs-container { display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
        .letter-input { width: clamp(28px, 8vw, 40px); height: clamp(38px, 12vw, 50px); font-size: clamp(18px, 6vw, 24px); text-align: center; border: 2px solid var(--success-green); border-radius: 6px; background: #1a1a2e; color: white; outline: none; }
        .space-box { width: 10px; }

        .decoder-ring { display: none; grid-template-columns: repeat(4, 1fr); gap: 4px; background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 12px; border: 1px solid var(--success-green); width: 95%; margin-top: 10px; overflow-y: auto; max-height: 35vh; }
        .decoder-item { font-size: clamp(12px, 3.5vw, 17px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; text-align: center; }

        .code-display { font-size: clamp(24px, 8vw, 40px); letter-spacing: 5px; margin: 8px 0; color: #fff; text-shadow: 0 0 10px var(--success-green); font-weight: bold; }
        #final-prize { display: none; width: 100%; height: 100%; object-fit: contain; background: var(--dark-bg); position: absolute; top:0; left:0; z-index: 100; }
        #msg { color: var(--success-green); height: 20px; margin-top: 5px; }
    </style>
</head>
<body>

<img src="logo.jpg" class="clinic-logo" alt="לוגו" onerror="this.onerror=null; this.src='logo.png';">

<div id="intro-screen">
