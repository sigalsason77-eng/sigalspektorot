<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>טוען את המשחק...</title>
    <script>
        (function() {
            // פונקציה לבדיקה האם המכשיר הוא נייד (טלפון או טאבלט)
            function isMobile() {
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                // בודק סימנים נפוצים למובייל וגם בודק אייפד/טאבלט
                return /android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase()) || 
                       (navigator.maxTouchPoints > 1 && !/window/i.test(userAgent.toLowerCase()));
            }

            // העברה אוטומטית לפי התוצאה
            if (isMobile()) {
                window.location.href = "mobile.html";
            } else {
                window.location.href = "desktop.html";
            }
        })();
    </script>
</head>
<body style="background-color: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif;">
    <p>טוען את הכספת, רק רגע...</p>
</body>
</html>
