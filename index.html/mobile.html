<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משימת הכספת - פסח</title>
    <style>
        :root { --primary-red: #e94560; --success-green: #4eff4e; --dark-bg: #0a0a1a; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; 
        }

        /* לוגו - הגדרה מוחלטת שתמיד תהיה מעל הכל */
        .clinic-logo {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 100px;
            height: auto;
            z-index: 10000; /* הכי גבוה */
            pointer-events: none;
        }

        .vault-scene { 
            position: relative; 
            width: 85vw; 
            height: 85vw; 
            max-width: 380px; 
            max-height: 380px; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8); 
            background: #16213e; 
            overflow: visible; /* מאפשר לדלתות "לצאת" מהמסגרת בפתיחה */
        }

        .game-area { 
            position: absolute; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: radial-gradient(circle, #1a1a2e, #0f3460); 
            border-radius: 15px;
            z-index: 1; padding: 15px; box-sizing: border-box; 
        }

        .door { 
            position: absolute; 
            top: 0;
            width: 50.5%; /* חפיפה קטנה למנוע קו לבן באמצע */
            height: 100%; 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 10; 
        }

        .door-left { left: 0; background-image: url('כספתשמאל.png'); border-radius: 15px 0 0 15px; }
        .door-right { right: 0; background-image: url('כספתימין.png'); border-radius: 0 15px 15px 0; }
        
        .open .door-left { transform: translateX(-100%); }
        .open .door-right { transform: translateX(100%); }

        #action-btn, .start-btn { 
            padding: 12px 30px; font-size: 18px; 
            background: var(--primary-red); color: white; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        #btn-container { margin-top: 30px; z-index: 100; min-height: 60px; }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a1a; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9000; 
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        .riddle-text { font-size: 16px; margin-bottom: 10px; line-height: 1.4; text-align: center; }
        .inputs-container { display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
        .letter-input { width: 30px; height: 40px; font-size: 20px; text-align: center; border: 2px solid var(--success-green); border-radius: 5px; background: #000; color: white; -webkit-appearance: none; }
        
        .decoder-ring { display: none; grid-template-columns: repeat(4, 1fr); gap: 5px; background: rgba(0, 0, 0, 0.9); padding: 10px; border: 1px solid var(--success-green); width: 100%; max-height: 120px; overflow-y: auto; border-radius: 8px; }
        .decoder-item { font-size: 13px; padding: 2px; }

        #final-prize { display: none; width: 100%; height: 100%; object-fit: contain; z-index: 100; position: absolute; top:0; left:0; border-radius: 15px; }
        #msg { color: var(--success-green); font-weight: bold; margin-top: 5px; height: 20px; }
        #key-img { position: absolute; width: 80px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; display: none; filter: drop-shadow(0 0 10px gold); }
    </style>
</head>
<body>

<img src="logo.jpg" class="clinic-logo" alt="לוגו" onerror="this.src='logo.png'">

<div id="intro-screen">
    <h1 style="color: var(--success-green); font-size: 28px;">חפש את המטמון!</h1>
    <p style="font-size: 18px;">מוכנים למצוא את האפיקומן?</p>
    <button class="start-btn" onclick="closeIntro()">מתחילים!</button>
</div>

<div class="vault-scene" id="scene">
    <div class="game-area">
        <div id="riddle-display" style="display:none; flex-direction: column; align-items: center; width: 100%;">
            <p class="riddle-text" id="riddle-q"></p>
            <div id="secret-code" style="display:none; font-size: 24px; margin-bottom: 10px; letter-spacing: 5px;">😂🎮💚🎈😜🤓</div>
            <div class="inputs-container" id="inputs-wrapper"></div>
            <div id="decoder" class="decoder-ring">
                <div class="decoder-item">א 😂</div><div class="decoder-item">ב 😱</div><div class="decoder-item">ג 👍</div><div class="decoder-item">ד 🔥</div><div class="decoder-item">ה 😍</div><div class="decoder-item">ו 😜</div>
                <div class="decoder-item">ז 😊</div><div class="decoder-item">ח 👽</div><div class="decoder-item">ט 😎</div><div class="decoder-item">י 💚</div><div class="decoder-item">כ 🙏</div><div class="decoder-item">ל 😮</div>
                <div class="decoder-item">מ 🤓</div><div class="decoder-item">נ 🐹</div><div class="decoder-item">ס 🙈</div><div class="decoder-item">ע 🍭</div><div class="decoder-item">פ 🎮</div><div class="decoder-item">צ 🚀</div>
                <div class="decoder-item">ק 🎈</div><div class="decoder-item">ר 🏀</div><div class="decoder-item">ש 😇</div><div class="decoder-item">ת 🙉</div><div class="decoder-item">ם 👀</div><div class="decoder-item">ן 🥑</div>
            </div>
            <div id="msg"></div>
        </div>
        <img src="אפיקומן.png" id="final-prize">
    </div>
    <div class="door door-left" id="d-left"></div>
    <div class="door door-right" id="d-right"></div>
    <img src="מפתח.png" id="key-img" onclick="openFinalVault()">
</div>

<div id="btn-container">
    <button id="action-btn" onclick="handleButtonClick()" style="display:none;">פתח את הכספת</button>
</div>

<script>
    const stages = [
        { q: "בערב פסח, במרכז השולחן אני מונחת, יש עליי שישה מאכלים... מי אני?", a: ["קערת הסדר", "צלחת הסדר", "צלחת הפסח", "קערת הפסח"], nextR: "כספתאדום.png" },
        { q: "בכל ערב פסח, בכל בית ישראל מכינים לי כיסא, מוזגים לי כוס יין גדולה... מי אני?", a: ["אליהו הנביא"], nextR: "כספתירוק.png" },
        { q: "אוכלים אותי בפסח, אני שטוחה, דקה ויבשה... מי אני?", a: ["מצה"], nextR: "כספתירוק.png", nextL: "כספתכחול.png" },
        { q: "היינו עשרה סימנים של כוח- דם, צפרדע, כינים... מי אנחנו?", a: ["עשר המכות"], nextR: "כספתירוק.png", nextL: "כספתכתום.png" }
    ];

    let currentStep = 0;
    let isVaultOpen = false;
    let isCodeSolved = false;

    // טעינת תמונות מראש למניעת תקיעות
    const imagesToPreload = ["כספתאדום.png", "כספתירוק.png", "כספתכחול.png", "כספתכתום.png", "מפתח.png", "אפיקומן.png"];
    imagesToPreload.forEach(src => { const img = new Image(); img.src = src; });

    function closeIntro() { 
        document.getElementById('intro-screen').style.display = 'none'; 
        document.getElementById('action-btn').style.display = 'block';
    }

    function handleButtonClick() {
        if (isCodeSolved) { showFinalPrize(); return; }
        if (!isVaultOpen) {
            document.getElementById('scene').classList.add('open');
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('riddle-display').style.display = 'flex';
            isVaultOpen = true;
            setupRiddle();
        } else { prepareNextLevel(); }
    }

    function setupRiddle() {
        const stageData = (currentStep < stages.length) ? stages[currentStep] : { q: "פתרו את כתב הסתרים:", a: ["אפיקומן"] };
        document.getElementById('riddle-q').innerText = stageData.q;
        document.getElementById('secret-code').style.display = (currentStep >= stages.length) ? 'block' : 'none';
        document.getElementById('decoder').style.display = (currentStep >= stages.length) ? 'grid' : 'none';
        
        const container = document.getElementById('inputs-wrapper');
        container.innerHTML = '';
        document.getElementById('msg').innerText = '';

        const primaryAnswer = stageData.a[0];
        primaryAnswer.split('').forEach((char) => {
            if (char === ' ') {
                const s = document.createElement('div'); s.style.width = '10px'; container.appendChild(s);
            } else {
                const input = document.createElement('input');
                input.className = 'letter-input';
                input.maxLength = 1;
                input.addEventListener('input', (e) => {
                    if (e.target.value) {
                        const inputs = container.querySelectorAll('.letter-input');
                        const idx = Array.from(inputs).indexOf(e.target);
                        if (inputs[idx + 1]) inputs[idx + 1].focus();
                    }
                    validateAnswer();
                });
                container.appendChild(input);
            }
        });
    }

    function validateAnswer() {
        const inputs = document.querySelectorAll('.letter-input');
        const stageData = (currentStep < stages.length) ? stages[currentStep] : { a: ["אפיקומן"] };
        const userAns = Array.from(inputs).map(i => i.value).join('');
        const isCorrect = stageData.a.some(a => a.replace(/\s/g, '') === userAns);

        if (isCorrect) {
            document.getElementById('msg').innerText = "נכון מאוד!";
            const btn = document.getElementById('action-btn');
            btn.style.display = 'block';
            if (currentStep < stages.length) {
                btn.innerText = "לכספת הבאה";
            } else {
                btn.innerText = "קבלת האפיקומן";
                isCodeSolved = true;
            }
        }
    }

    function prepareNextLevel() {
        const stage = stages[currentStep];
        if(stage.nextL) document.getElementById('d-left').style.backgroundImage = `url('${stage.nextL}')`;
        if(stage.nextR) document.getElementById('d-right').style.backgroundImage = `url('${stage.nextR}')`;
        
        document.getElementById('scene').classList.remove('open');
        document.getElementById('riddle-display').style.display = 'none';
        
        setTimeout(() => {
            currentStep++;
            if (currentStep === stages.length) {
                document.getElementById('key-img').style.display = 'block';
                document.getElementById('action-btn').style.display = 'none';
            } else {
                document.getElementById('action-btn').innerText = "פתח את הכספת";
                document.getElementById('action-btn').style.display = 'block';
            }
            isVaultOpen = false;
        }, 850);
    }

    function openFinalVault() {
        document.getElementById('key-img').style.display = 'none';
        document.getElementById('scene').classList.add('open');
        document.getElementById('riddle-display').style.display = 'flex';
        setupRiddle();
    }

    function showFinalPrize() {
        document.getElementById('final-prize').style.display = 'block';
        document.getElementById('riddle-display').style.display = 'none';
        document.getElementById('action-btn').style.display = 'none';
    }
</script>
</body>
</html>
